<!DOCTYPE html>
<html>
<head>
  <title>Invest</title>
  <link rel="stylesheet" href="../css/style.css">

  <style>
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      height: 100vh;
      width: 240px;
      overflow-y: auto;
    }

    .main {
      margin-left: 260px;
    }

    .logout-btn {
      margin-top: 20px;
      background: #ef4444;
      color: white;
      padding: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      width: 90%;
    }

    .logout-btn:hover {
      background: #dc2626;
    }
  </style>
</head>

<body>

<!-- 🔐 Protect Page -->
<script>
if (!localStorage.getItem("token")) {
  alert("Please login first");
  window.location.href = "login.html";
}
</script>

<div class="sidebar">
  <h2>EcoVest 🌱</h2>
  <a href="dashboard.html">Dashboard</a>
  <a href="learn.html">Learn</a>
  <a href="invest.html">Invest</a>
  <a href="analyzer.html">Analyzer</a>
  <a href="news.html">News</a>

  <!-- 🚪 Logout -->
  <button class="logout-btn" onclick="logout()">🚪 Logout</button>
</div>

<div class="main fade-in">
  <h2>Investment Options</h2>

  <div class="card" onclick="showOptions('sip')">
    <h3>📈 SIP</h3>
    <p>Low risk, long-term growth</p>
  </div>

  <div class="card" onclick="showOptions('insurance')">
    <h3>🏥 Medical Insurance</h3>
    <p>Financial + health security</p>
  </div>

  <div class="card" onclick="showOptions('esg')">
    <h3>🌿 ESG Funds</h3>
    <p>Invest sustainably</p>
  </div>

  <div id="options"></div>
</div>

<script>
// 🚪 Logout
function logout() {
  localStorage.removeItem("token");
  localStorage.removeItem("user");
  alert("Logged out!");
  window.location.href = "../index.html";
}

// Show Options
function showOptions(type) {
  let html = "";

  if (type === "sip") {
    html = `
      <div class="card fade-in">
        <h3>SIP Options</h3>

        ${createOption("HDFC Top 100 Fund", "12%", "Medium")}
        ${createOption("ICICI Bluechip Fund", "10%", "Low")}
        ${createOption("Axis Growth Fund", "14%", "High")}
        ${createOption("SBI Equity Fund", "11%", "Medium")}
      </div>
    `;
  }

  else if (type === "insurance") {
    html = `
      <div class="card fade-in">
        <h3>Medical Insurance Plans</h3>

        ${createInsurance("Star Health", "₹5L", "₹500")}
        ${createInsurance("HDFC Ergo", "₹10L", "₹800")}
        ${createInsurance("ICICI Lombard", "₹7L", "₹650")}
        ${createInsurance("Care Health", "₹8L", "₹700")}
      </div>
    `;
  }

  else if (type === "esg") {
    html = `
      <div class="card fade-in">
        <h3>ESG Funds</h3>

        ${createEsg("SBI ESG Fund")}
        ${createEsg("Axis ESG Fund")}
        ${createEsg("ICICI ESG Leaders")}
        ${createEsg("HDFC Sustainable Fund")}
      </div>
    `;
  }

  document.getElementById("options").innerHTML = html;
}

function createOption(name, returnRate, risk) {
  return `
    <div class="card">
      <h4>${name}</h4>
      <p>Return: ${returnRate} | Risk: ${risk}</p>
      <button onclick="invest('${name}')">Invest</button>
    </div>
  `;
}

function createInsurance(name, coverage, premium) {
  return `
    <div class="card">
      <h4>${name}</h4>
      <p>Coverage: ${coverage} | Premium: ${premium}/month</p>
      <button onclick="invest('${name}')">Select</button>
    </div>
  `;
}

function createEsg(name) {
  return `
    <div class="card">
      <h4>${name}</h4>
      <p>🌱 Sustainable investment</p>
      <button onclick="invest('${name}')">Invest</button>
    </div>
  `;
}

// Send to dashboard
function invest(name) {
  localStorage.setItem("selectedInvestment", name);
  window.location.href = "dashboard.html";
}
</script>

</body>
</html>
