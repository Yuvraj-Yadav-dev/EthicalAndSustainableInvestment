<!DOCTYPE html>
<html>
<head>
  <title>News</title>
  <link rel="stylesheet" href="../css/style.css">

  <style>
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      height: 100vh;
      width: 240px;
    }

    .main {
      margin-left: 260px;
    }

    .logout-btn {
      margin-top: 20px;
      background: #ef4444;
      color: white;
      padding: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      width: 90%;
    }

    .logout-btn:hover {
      background: #dc2626;
    }

    .news-card {
      margin-bottom: 20px;
      display: flex;
      gap: 15px;
      align-items: flex-start;
      transition: 0.3s;
    }

    .news-card:hover {
      transform: translateY(-5px);
    }

    .news-img {
      width: 120px;
      height: 80px;
      object-fit: cover;
      border-radius: 10px;
    }

    .news-content {
      flex: 1;
    }
  </style>
</head>

<body>

<!-- 🔐 Protect Page -->
<script>
if (!localStorage.getItem("token")) {
  alert("Please login first");
  window.location.href = "login.html";
}
</script>

<div class="sidebar">
  <h2>EcoVest 🌱</h2>
  <a href="dashboard.html">Dashboard</a>
  <a href="learn.html">Learn</a>
  <a href="invest.html">Invest</a>
  <a href="analyzer.html">Analyzer</a>
  <a href="news.html">News</a>

  <!-- 🚪 Logout -->
  <button class="logout-btn" onclick="logout()">🚪 Logout</button>
</div>

<div class="main fade-in">
  <h2>📰 ESG + Finance + Investment News</h2>

  <div id="news">Loading news...</div>
</div>

<script>
const API_KEY = "c55e0c5ef864e10a9cd4e0e9cc5c1b86";

// 🚪 Logout
function logout() {
  localStorage.removeItem("token");
  localStorage.removeItem("user");
  alert("Logged out!");
  window.location.href = "../index.html";
}

// 🔥 MULTIPLE QUERIES
const queries = [
  "ESG investing",
  "sustainable investing",
  "stock market",
  "finance investing",
  "green finance"
];

async function loadNews() {
  let articles = [];

  for (let q of queries) {
    let res = await fetch(
      `https://gnews.io/api/v4/search?q=${q}&lang=en&max=5&token=${API_KEY}`
    );

    let data = await res.json();

    if (data.articles && data.articles.length > 0) {
      articles = data.articles;
      break;
    }
  }

  if (articles.length === 0) {
    document.getElementById("news").innerHTML =
      "❌ Unable to load news";
    return;
  }

  let html = "";

  articles.forEach(article => {
    html += `
      <div class="card news-card fade-in">
        <img class="news-img" src="${article.image || 'https://via.placeholder.com/120'}">

        <div class="news-content">
          <h3>${article.title}</h3>
          <p>${article.description || ""}</p>
          <a href="${article.url}" target="_blank">Read More →</a>
        </div>
      </div>
    `;
  });

  document.getElementById("news").innerHTML = html;
}

loadNews();
</script>

</body>
</html>
